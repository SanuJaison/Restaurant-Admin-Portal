<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    

    <title>SmartBites | Restaurant Admin Portal</title>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <nav
      class="bg-white shadow-md px-6 py-4 flex justify-between sticky top-0 z-50"
    >
      <div
        class="text-orange-500 text-3xl font-semibold flex gap-2 items-center"
      >
        <i class="fa-solid fa-bowl-food"></i>
        <p>SmartBites</p>
      </div>
      <div class="flex gap-2 items-center">
        <button id="addBtn"
          class="text-white bg-orange-500 rounded-full p-4 font-semibold hover:bg-orange-600 duration-200"
        >
          <i class="fa-solid fa-plus"></i> Add New Item
        </button>
      </div>
    </nav>
    <!-- data cards -->
    <div class="grid grid-cols-3 gap-6 p-6">
      <div class="bg-white p-6 rounded-2xl shadow-md flex justify-between">
        <div>
          <h2 class="text-gray-500">Total Items</h2>

          <p id="totalItems" class="text-3xl font-bold mt-2 text-orange-500">0</p>
        </div>
        <div
          class="bg-[#fff7ed] w-20 h-20 rounded-2xl flex items-center justify-center"
        >
          <i class="fa-solid fa-layer-group text-orange-500 text-3xl"></i>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-md flex justify-between">
        <div>
          <h2 class="text-gray-500">Available</h2>

          <p id="availableItems" class="text-3xl font-bold mt-2 text-green-600">0</p>
        </div>
        <div
          class="bg-green-100 w-20 h-20 rounded-2xl flex items-center justify-center"
        >
          <i class="fa-solid fa-circle-check text-green-600 text-3xl"></i>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-md flex justify-between">
        <div>
          <h2 class="text-gray-500">Out Of Stock</h2>

          <p id="outStockItems" class="text-3xl font-bold mt-2 text-red-600">0</p>
        </div>
        <div
          class="bg-red-100 w-20 h-20 rounded-2xl flex items-center justify-center"
        >
          <i class="fa-solid fa-circle-xmark text-red-600 text-3xl"></i>
        </div>
      </div>
    </div>

    <!-- searchbar and filter -->
    <div class="flex justify-between px-5 gap-5">
      <div
        class="text-lg flex items-center bg-white px-4 py-2 rounded-lg shadow-md w-full focus-within:ring-2 focus-within:ring-orange-400"
      >
        <i class="fa-solid fa-magnifying-glass text-gray-500"></i>

        <input
        id="searchBar"
          type="search"
          placeholder="Search food items..."
          class="ml-3 w-full outline-none"
        />
      </div>
      <select id="filterBox"
        class="rounded-lg p-3 text-lg outline-none focus:ring-2 focus:ring-orange-400"
      >
        <option>All Categories</option>
        <option>Main Course</option>
        <option>Starters</option>
        <option>Deserts</option>
        <option>Beverages</option>
        <option>Fast Food</option>
      </select>
    </div>

    <!-- food cards -->
    <div id="cardContainer" class="grid grid-cols-4 gap-6 m-6">
      
    </div>

    <div id="itemWindow"
      class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm items-center justify-center z-50"
    >
      <div id="addBox" class="bg-white w-[40%] rounded-2xl shadow-2xl px-8 py-3 space-y-5">
        <div class="flex justify-between border-b py-3">
          <p class="text-2xl font-[700]">Add New Food Item</p>
          <button id="closeBtn">
            <i
              class="fa-solid fa-xmark text-3xl text-gray-400 hover:text-[#4b5563]"
            ></i>
          </button>
        </div>
        <form id="foodForm" class="space-y-2">


      <div>
        <label class="block text-lg font-semibold mb-2">
          Food Name
        </label>

        <input id="foodName"
          type="text"
          required
          placeholder="e.g., Spicy Paneer Burger"
          class="w-full border rounded-xl p-4 text-lg outline-none
                 focus:ring-2 focus:ring-orange-400"
        >
      </div>


      <div class="grid grid-cols-2 gap-6">

        <div>
          <label class="block text-lg font-semibold mb-2">
            Category
          </label>

          <select id="foodCategory" required
            class="w-full border rounded-xl p-4 text-lg outline-none
                   focus:ring-2 focus:ring-orange-400"
          >
            <option>Main Course</option>
            <option>Starters</option>
            <option>Desserts</option>
            <option>Beverages</option>
            <option>Fast Food</option>
          </select>
        </div>


        <div>
          <label class="block text-lg font-semibold mb-2">
            Price ($)
          </label>

          <input id="foodPrice"
            type="number"
            required
            placeholder="0.00"
            class="w-full border rounded-xl p-4 text-lg outline-none
                   focus:ring-2 focus:ring-orange-400"
          >
        </div>

      </div>


      <div>
        <label class="block text-lg font-semibold mb-2">
          Image URL
        </label>

        <input id="foodImg"
          type="url"
          required
          placeholder="https://images.com/..."
          class="w-full border rounded-xl p-4 text-lg outline-none
                 focus:ring-2 focus:ring-orange-400"
        >
      </div>

      <div>
        <label class="block text-lg font-semibold mb-2">
          Description
        </label>

        <textarea id="foodDesc"
        required
          placeholder="Short appetizing description..."
          class="w-full border rounded-xl p-4 text-lg outline-none
                 focus:ring-2 focus:ring-orange-400"
        ></textarea>
      </div>

      <div class="flex items-center gap-3">
        <input id="tick"
          type="checkbox"
          checked
          class="w-5 h-5 accent-orange-500"
        >

        <label class="text-lg">
          Currently Available
        </label>
      </div>


      <button id="saveBtn"
        class="w-full bg-orange-500 hover:bg-orange-600
               text-white text-xl font-semibold py-4 rounded-xl duration-200"
      >
        Save Food Item
      </button>

    </form>
      </div>
    </div>

    <!-- no items -->
     <div id="noItems" class="hidden text-center p-10 space-y-3">
      <div class="bg-gray-200 w-full text-[#d1d5db] text-[70px] rounded-full p-4"><i class="fa-solid fa-pizza-slice"></i></div>
      <div>
        <p class="text-2xl font-[700]">No food items found</p>
        <p>Try adding a new item or adjusting your search.</p>
      </div>
     </div>
  </body>
<script src="script.js"></script>
  
</html>
