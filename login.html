<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="crudlogo-Photoroom.png" type="image/png" />
    <title>SmartBites | Login</title>
  </head>
  <body class="bg-gradient-to-br from-orange-50 to-red-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-lg p-6 sm:p-8 space-y-6">
      <div class="text-orange-500 text-5xl text-center">
        <i class="fa-solid fa-bowl-food"></i>
      </div>
      <div class="flex flex-col gap-2 items-center text-center">
        <p class="text-3xl sm:text-4xl font-bold">Welcome Back</p>
        <p class="text-gray-500 text-sm sm:text-base">Login to manage your restaurant menu</p>
      </div>
      <div class="space-y-8">
        <form id="loginForm" class="space-y-5">
          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700">Email Address</label>
            <div class="relative">
              <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="email" id="loginEmail" required class="w-full px-12 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none" placeholder="restaurant@gmail.com" />
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700 mb-1">Password</label>
            <div class="relative">
              <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="password" id="loginPassword" required class="w-full px-12 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none transition-all" placeholder="Enter password" />
            </div>
          </div>
          <button type="submit" id="loginBtn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 sm:py-4 rounded-xl shadow-lg shadow-orange-200 flex items-center justify-center gap-2 transition-colors">
            <span>Sign In</span>
            <i class="fas fa-arrow-right text-sm"></i>
          </button>
        </form>
        <div class="pt-4 border-t border-gray-100 text-center">
          <p class="text-gray-600 text-sm sm:text-base">
            <span id="regText">Don't have an account?</span>
            <a href="register.html">
              <button id="regLink" class="text-orange-600 font-bold hover:underline ml-1 focus:outline-none">Register Now</button>
            </a>
          </p>
        </div>
      </div>
    </div>
  </body>
  <script src="js/login.js"></script>
</html>
