<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>SmartBites | Register</title>
  </head>
  <body class="bg-gradient-to-br from-orange-50 to-red-50 min-h-screen flex items-center justify-center p-4 py-8">
    <div class="bg-white w-full max-w-xl rounded-3xl shadow-lg p-6 sm:p-8 space-y-6">
      <div class="text-orange-500 text-5xl text-center">
        <i class="fa-solid fa-bowl-food"></i>
      </div>
      <div class="flex flex-col gap-2 items-center text-center">
        <p class="text-3xl sm:text-4xl font-bold">Create Account</p>
        <p class="text-gray-500 text-sm sm:text-base">
          Join <span class="text-orange-600 font-semibold">SmartBites</span> to build your digital menu
        </p>
      </div>
      <form id="regForm" class="space-y-4 sm:space-y-5">
        <div class="space-y-2">
          <label class="text-sm font-semibold text-gray-700">Restaurant Name</label>
          <div class="relative">
            <i class="fas fa-store absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="restaurantName" required placeholder="Enter restaurant name" class="w-full px-12 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none" />
          </div>
        </div>
        <div class="space-y-2">
          <label class="text-sm font-semibold text-gray-700">Email Address</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="email" id="regEmail" required placeholder="restaurant@gmail.com" class="w-full px-12 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none" />
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700">Password</label>
            <div class="relative">
              <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="password" id="regPassword" required minlength="8" placeholder="Min 8 chars" class="w-full px-11 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none" />
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700">Confirm Password</label>
            <div class="relative">
              <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="password" id="confirmPassword" required minlength="8" placeholder="Confirm password" class="w-full px-11 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none" />
            </div>
          </div>
        </div>
        <div class="space-y-2">
          <label class="text-sm font-semibold text-gray-700">Restaurant Logo</label>
          <input type="file" id="logoUpload" accept="image/*" class="hidden" />
          <label for="logoUpload" class="border-2 border-dashed border-orange-300 rounded-2xl p-6 sm:p-8 flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-orange-50 duration-200">
            <div class="text-orange-500 text-3xl sm:text-4xl">
              <i class="fa-solid fa-cloud-arrow-up"></i>
            </div>
            <p class="font-semibold text-gray-700 text-center text-sm sm:text-base">Click to upload logo</p>
            <p class="text-xs sm:text-sm text-gray-500">PNG, JPG or JPEG</p>
          </label>
        </div>
        <button type="submit" id="regBtn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 sm:py-4 rounded-xl shadow-lg shadow-orange-200 flex items-center justify-center gap-2 duration-200 mt-2">
          <span>Register Now</span>
          <i class="fas fa-arrow-right text-sm"></i>
        </button>
      </form>
      <div class="pt-4 border-t border-gray-100 text-center">
        <p class="text-gray-600 text-sm sm:text-base">
          Already have an account?
          <a href="login.html" class="text-orange-600 font-bold hover:underline ml-1">Login Instead</a>
        </p>
      </div>
    </div>
  </body>
  <script src="js/register.js"></script>
</html>
