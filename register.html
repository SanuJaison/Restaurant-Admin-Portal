<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <title>SmartBites | Register</title>
  </head>

  <body class="bg-gradient-to-br from-orange-50 to-red-50 min-h-screen">
    <div class="w-full flex justify-center py-12 px-4">
      <div class="bg-white w-full max-w-xl rounded-3xl shadow-lg p-8 space-y-6">
        <!-- Logo -->
        <div class="text-orange-500 text-[50px] text-center">
          <i class="fa-solid fa-bowl-food"></i>
        </div>

        <!-- Heading -->
        <div class="flex flex-col gap-2 items-center text-center">
          <p class="text-[35px] font-[700]">Create Account</p>

          <p class="text-[#6b7280] text-lg">
            Join
            <span class="text-orange-600 font-semibold"> SmartBites </span>
            to build your digital menu
          </p>
        </div>

        <!-- Form -->
        <form id="regForm" class="space-y-5">
          <!-- Restaurant Name -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700">
              Restaurant Name
            </label>

            <div class="relative">
              <i
                class="fas fa-store absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
              ></i>

              <input
                type="text"
                id="restaurantName"
                required
                placeholder="Enter restaurant name"
                class="w-full px-12 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none"
              />
            </div>
          </div>

          <!-- Email -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700">
              Email Address
            </label>

            <div class="relative">
              <i
                class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
              ></i>

              <input
                type="email"
                id="regEmail"
                required
                placeholder="restaurant@gmail.com"
                class="w-full px-12 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none"
              />
            </div>
          </div>

          <!-- Password -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700">
              Password
            </label>

            <div class="relative">
              <i
                class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
              ></i>

              <input
                type="password"
                id="regPassword"
                required
                minlength="8"
                placeholder="Enter minimum 8 characters"
                class="w-full px-12 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none"
              />
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700">
              Confirm Password
            </label>

            <div class="relative">
              <i
                class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
              ></i>

              <input
                type="password"
                id="confirmPassword"
                required
                minlength="8"
                placeholder="Confirm password"
                class="w-full px-12 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:outline-none"
              />
            </div>
          </div>

          <!-- Logo Upload -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-700">
              Restaurant Logo
            </label>

            <!-- Hidden File Input -->
            <input
              type="file"
              id="logoUpload"
              accept="image/*"
              class="hidden"
            />

            <!-- Custom Upload Box -->
            <label
              for="logoUpload"
              class="border-2 border-dashed border-orange-300 rounded-2xl p-8 flex flex-col items-center justify-center gap-3 cursor-pointer hover:bg-orange-50 duration-200"
            >
              <div class="text-orange-500 text-4xl">
                <i class="fa-solid fa-cloud-arrow-up"></i>
              </div>

              <p class="font-semibold text-gray-700">Click to upload logo</p>

              <p class="text-sm text-gray-500">PNG, JPG or JPEG</p>
            </label>
          </div>

          <!-- Button -->
          <button
            type="submit"
            id="regBtn"
            class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-orange-200 flex items-center justify-center gap-2 duration-200"
          >
            <span>Register Now</span>

            <i class="fas fa-arrow-right text-sm"></i>
          </button>
        </form>

        <!-- Login Link -->
        <div class="pt-4 border-t border-gray-100 text-center">
          <p class="text-gray-600">
            Already have an account?

            <a
              href="login.html"
              class="text-orange-600 font-bold hover:underline ml-1"
            >
              Login Instead
            </a>
          </p>
        </div>
      </div>
    </div>
  </body>

  <script src="js/register.js"></script>
</html>
